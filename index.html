<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown 实时预览</title>
  <!-- Using system fonts for total offline compatibility -->
  <link rel="stylesheet" href="./src/style.css">
</head>

<body>
  <header class="app-header">
    <div class="header-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4" />
        <path d="M4 6v12c0 1.1.9 2 2 2h14v-4" />
        <path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z" />
      </svg>
      <span>Markdown 实时预览</span>
    </div>
    <div class="header-actions">
      <button id="reset-button" class="btn text-btn">重置</button>
      <button id="copy-button" class="btn text-btn">复制</button>
      <button id="export-button" class="btn primary-btn">导出 PDF</button>

      <div class="controls-group">
        <label class="checkbox-label">
          <input type="checkbox" id="sync-scroll-checkbox" checked>
          同步滚动
        </label>
        <label class="checkbox-label" style="margin-left:12px;">
          <input type="checkbox" id="theme-checkbox" checked>
          暗色模式
        </label>
      </div>
    </div>
  </header>

  <main class="app-main">
    <div id="editor-container" class="split">
    </div>
    <div id="preview-container" class="split">
      <div id="preview" class="markdown-body">
        <!-- Rendered Markdown will go here -->
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
